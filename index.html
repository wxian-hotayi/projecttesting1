<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Working Day Countdown</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: linear-gradient(145deg, #1e293b 0%, #334155 100%);
            border-radius: 24px;
            padding: 48px;
            box-shadow:
                0 25px 50px rgba(0,0,0,0.4),
                0 0 100px rgba(99, 102, 241, 0.1),
                inset 0 1px 0 rgba(255,255,255,0.05);
            width: 100%;
            max-width: 500px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        h1 {
            text-align: center;
            background: linear-gradient(135deg, #818cf8 0%, #c084fc 50%, #f472b6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 32px;
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-weight: 500;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="date"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #334155;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #0f172a;
            color: #e2e8f0;
        }

        input[type="date"]:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #d946ef 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(99, 102, 241, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            display: none;
            margin-top: 32px;
            text-align: center;
        }

        .big-number {
            font-size: 5.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #818cf8 0%, #c084fc 50%, #f472b6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }

        .big-number-label {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 28px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
        }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 32px;
            padding-top: 32px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 2.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, #38bdf8 0%, #22d3ee 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .holiday-note {
            margin-top: 24px;
            padding: 16px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 12px;
            font-size: 0.85rem;
            color: #94a3b8;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        /* Date input placeholder styling */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Working Day Countdown</h1>

        <div class="input-group">
            <label>Start Date</label>
            <input type="date" id="startDate">
        </div>

        <div class="input-group">
            <label>End Date</label>
            <input type="date" id="endDate">
        </div>

        <button onclick="calculate()">Calculate</button>

        <div class="result" id="result">
            <div class="big-number" id="daysLeft">0</div>
            <div class="big-number-label">Days Left</div>

            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="daysPassed">0</div>
                    <div class="stat-label">Days Passed</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalDays">0</div>
                    <div class="stat-label">Total Days</div>
                </div>
            </div>

            <div class="holiday-note" id="holidayNote"></div>
        </div>
    </div>

    <script>
        const holidays = [
            '2026-01-01', '2026-02-16', '2026-02-17', '2026-02-18',
            '2026-03-23', '2026-03-24', '2026-05-01', '2026-05-27',
            '2026-06-01', '2026-07-13', '2026-08-31', '2026-09-16',
            '2026-11-09', '2026-12-25'
        ].map(d => new Date(d));

        function isHoliday(date) {
            return holidays.some(h =>
                h.getFullYear() === date.getFullYear() &&
                h.getMonth() === date.getMonth() &&
                h.getDate() === date.getDate()
            );
        }

        function isWeekend(date) {
            const day = date.getDay();
            return day === 0 || day === 6;
        }

        function countWorkingDays(startDate, endDate) {
            let count = 0;
            let passed = 0;
            const current = new Date(startDate);
            const end = new Date(endDate);
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            while (current <= end) {
                if (!isWeekend(current) && !isHoliday(current)) {
                    if (current < today) {
                        passed++;
                    } else if (current <= today) {
                        passed++;
                    }
                    count++;
                }
                current.setDate(current.getDate() + 1);
            }

            return { total: count, passed };
        }

        function calculate() {
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;

            if (!startDate || !endDate) {
                alert('Please enter both start and end dates');
                return;
            }

            const start = new Date(startDate);
            const end = new Date(endDate);

            if (start > end) {
                alert('Start date must be before end date');
                return;
            }

            const { total, passed } = countWorkingDays(start, end);
            const daysLeft = Math.max(0, total - passed);

            document.getElementById('daysLeft').textContent = daysLeft;
            document.getElementById('daysPassed').textContent = passed;
            document.getElementById('totalDays').textContent = total;

            const holidayCount = holidays.filter(h => h >= start && h <= end).length;
            document.getElementById('holidayNote').textContent =
                `Excludes ${holidayCount} public holidays and weekends`;

            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
